# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # corne_left used to be the central; now that the dongle exists, force it
  # to run as a peripheral instead (see hardware-integration/dongle.mdx).
  - board: nice_nano_v2
    shield: corne_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano_v2
    shield: corne_right
  # seeeduino_xiao_ble, NOT the bare Zephyr xiao_ble board: only the former
  # gets ZMK's board tweaks (app/boards/seeeduino_xiao_ble.conf/.overlay -
  # ZMK_BLE/ZMK_USB on, NVS bond storage, battery divider). On plain
  # xiao_ble the trackball built with Bluetooth entirely off. (The old
  # standalone trackball repo's `xiao_ble//zmk` is this same board after
  # the hwmv2 rename on newer zmk than our pinned v0.3.)
  - board: seeeduino_xiao_ble
    shield: corne_dongle
  - board: seeeduino_xiao_ble
    shield: trackball
  # Flash to any device to clear its stored bonds - required once after
  # switching to the dongle topology, and useful again if pairing ever gets
  # stuck (the trackball/dongle have no physical &bt BT_CLR key of their own).
  - board: nice_nano_v2
    shield: settings_reset
  - board: seeeduino_xiao_ble
    shield: settings_reset
