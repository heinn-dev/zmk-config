# Core hardware requirements (SPI/PINCTRL/PMW3610_ALT/ZMK_POINTING/ZMK_SPLIT*)
# are declared in boards/shields/corne_trackball/Kconfig.defconfig, since
# they're mandatory for this shield rather than user preference.

# Sensor tuning - uncomment/adjust as needed. CPI is set in the devicetree
# node instead (see corne_trackball.overlay).
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8

# The sensor drops out of full-rate RUN sampling after just 128ms of no
# motion by default, into a much slower REST1 sampling rate - noticeable as
# lag every time movement resumes after a brief pause. Trade some power for
# staying in RUN mode much longer.
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=1000

# Power tuning
CONFIG_ZMK_SLEEP=y

# ZMK's default BLE peripheral latency (30) lets the radio skip up to 30
# connection intervals when idle, to save power - but this can add a
# noticeable "catch-up" delay when movement resumes. 0 forces a connection
# event every interval instead, trading battery life for responsiveness.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
