# The dongle is the host-facing HID output (by USB cable, and BLE in case
# it's ever used untethered). ZMK's seeeduino_xiao_ble board conf already
# defaults both on, but they're load-bearing - with neither set,
# ZMK_ENDPOINT_COUNT is 0 and the pointing subsystem fails to compile - so
# keep them explicit here.
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Smooth scrolling (bonus request: HID Resolution Multiplier based finer
# wheel deltas while hold-space-scrolling). Only meaningful where HID
# reports actually go out to a host, i.e. here, not corne_left/corne_right.
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Pointer acceleration (nuovotaka/zmk-pointing-acceleration-alpha, community
# module - not an official ZMK feature). All trackball input-processing
# lives in boards/shields/corne/corne_dongle.overlay, i.e. only in the
# dongle build, so this only needs to be enabled here.
CONFIG_ZMK_INPUT_PROCESSOR_ACCELERATION=y
CONFIG_INPUT_PROCESSOR_ACCEL_LEVEL_SIMPLE=y
CONFIG_INPUT_PROCESSOR_ACCEL_PRESET_CUSTOM=y

# CONFIG_ZMK_POINTING itself is set in corne.conf (shared with
# corne_left/corne_right, which already needed it for FLIP layer's &mmv/&msc
# key-triggered mouse emulation).
