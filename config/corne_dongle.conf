# Central-side mouse HID output + smooth scrolling (bonus request: HID
# Resolution Multiplier based finer wheel deltas while hold-space-scrolling).
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Pointer acceleration (nuovotaka/zmk-pointing-acceleration-alpha, community
# module - not an official ZMK feature). Level 1 "Simple" with custom values
# tuned for our 600 CPI sensor - see &pointer_accel in corne_dongle.keymap.
CONFIG_ZMK_INPUT_PROCESSOR_ACCELERATION=y
CONFIG_INPUT_PROCESSOR_ACCEL_LEVEL_SIMPLE=y
CONFIG_INPUT_PROCESSOR_ACCEL_PRESET_CUSTOM=y

# Local input-processor-axis-behaviors module (see repo root Kconfig/src/) -
# auto-enabled via devicetree usage, no explicit config needed here.
