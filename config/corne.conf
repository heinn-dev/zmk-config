# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_POINTING=y

# Pointer acceleration (nuovotaka/zmk-pointing-acceleration-alpha, community
# module - not an official ZMK feature) for the trackball. Enabled here
# rather than only in corne_dongle.conf because corne.keymap (shared by
# corne_left/corne_right/corne_dongle) references &pointer_accel - without
# this, corne_left/corne_right would fail to link against a processor with
# no compiled driver.
CONFIG_ZMK_INPUT_PROCESSOR_ACCELERATION=y
CONFIG_INPUT_PROCESSOR_ACCEL_LEVEL_SIMPLE=y
CONFIG_INPUT_PROCESSOR_ACCEL_PRESET_CUSTOM=y

